# Run from repo root:
#   docker compose -f docker/docker-compose.yml up --build
# Or:
#   cd docker && docker compose up --build
#
# UI: http://localhost   API: http://localhost:8080/api/tasks

services:
  mysql:
    image: mysql:8.0
    container_name: memcyco-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: memcyco_root_change_me
      MYSQL_DATABASE: memcyco_scheduler
      MYSQL_USER: memcyco
      MYSQL_PASSWORD: memcyco_app
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pmemcyco_root_change_me"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: memcyco-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/memcyco_scheduler?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USER: memcyco
      MYSQL_PASSWORD: memcyco_app
    depends_on:
      mysql:
        condition: service_healthy

  client:
    build:
      context: ../client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8080
    container_name: memcyco-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
